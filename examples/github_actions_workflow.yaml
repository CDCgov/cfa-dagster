name: Build Image & Update Dagster

on:
  # only update the server on pushes to main
  push:
    branches:
      - main

jobs:

  build-and-push-docker-image:
  # omitted for brevity

  update-dagster:
    # only update the server on pushes to main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # run after your image is pushed to ghcr or acr
    needs: build-docker-image
    # must run on the self-hosted runner to access the production server
    runs-on: cfa-cdcent-aca
    name: Update Dagster workflows
    steps:
      - name: Execute update script
        run: |
          uv run https://raw.githubusercontent.com/CDCgov/cfa-dagster/refs/heads/main/scripts/update_code_location.py \
          --registry_image '${{ env.AZ_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
