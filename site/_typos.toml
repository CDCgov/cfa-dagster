[default]
extend-ignore-identifiers-re = ["AttributeID.*Supress.*"]

[default.extend-identifiers]
AttributeIDSupressMenu = "AttributeIDSupressMenu"

[default.extend-words]
# words that should not be corrected
PN = "PN"
OPF = "OPF"
EIS = "EIS"
Damon = "Damon"

[files]
extend-exclude = [
    ".gitignore",
    ".pre-commit-config.yaml",
    "*.bib",
    "*.html",
    "*.js",
    "*.csl",
    "*.css",
    "*.ipynb",
    "*.json",
]
