name: "Build and deploy handbook website"
on:
  pull_request:
  push:
    branches:
      - kelly-docs

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      page_artifact_id: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build website
        run: |
          cd docs &&
          uv run zensical build --clean &&
          mv -f site/index.html ./ &&
          mv -f site/404.html ./ &&
          mv -f site/objects.inv ./ &&
          mv -f site/sitemap.xml ./ &&
          mv -f site/search.js ./ &&
          mv -f site/search.json ./ &&
          mv -f site/assets/* ./assets &&
          mv -f site/examples/* ./ &&
          mv -f site/getting-started/* ./ &&
          mv -f site/tutorial/* ./ 
        
      - uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: ./docs/
          retention-days: "3"

  post-page-artifact:
    if: ${{ github.event_name == 'pull_request' }}

    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write
      actions: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - name: Post artifact
        uses: CDCgov/cfa-actions/post-artifact@v1.5.0
        with:
          artifact-name: github-pages
          gh-token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: ${{ github.event_name == 'push' && github.ref_name == 'kelly-docs' }}

    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy to gh pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          preview: false
