name: "Build and deploy Dagster documentation website"
on:
  pull_request:
  push:
    branches:
      - docs

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      page_artifact_id: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Build website
        run: |
          cd docs &&
          uv run zensical build --clean &&
          cp -r site/* ./ &&
          git config --global user.email "tsw6@cdc.gov"
          git config --global user.name "kelly-a-reagan"
          git add docs/ &&
          git diff --cached --quiet || git commit -m "Copy site files to /docs for GitHub Pages" &&
          git push || true
        
      - uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: ./docs/
          retention-days: "3"

  post-page-artifact:
    if: ${{ github.event_name == 'pull_request' }}

    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write
      actions: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - name: Post artifact
        uses: CDCgov/cfa-actions/post-artifact@v1.5.0
        with:
          artifact-name: github-pages
          gh-token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: ${{ github.event_name == 'push' && github.ref_name == 'docs' }}

    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: deploy to gh pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          preview: false
          publish_dir: ./docs

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_SKY_09294A00F }}
          app_location: "./docs" # Path to the folder containing the built site
          output_location: "" # Leave empty if the output is in the app_location
