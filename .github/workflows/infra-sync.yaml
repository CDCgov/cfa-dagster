name: Sync infra deps

on:
  pull_request:
    branches: [main]
    paths:
      - infra/pyproject.toml
      - infra/uv.lock
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: infra
