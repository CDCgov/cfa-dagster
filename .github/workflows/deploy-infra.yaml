name: Deploy server

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'

env:
  IMAGE_NAME: cfa-dagster

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Extract version tag
        id: version
        run: |
          V=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Build Image
        run: nix build infra/#

      - name: Push image
        run: |
            OWNER='${{ github.repository_owner }}'
            # to lowercase
            OWNER=${OWNER,,}
            REGISTRY_IMAGE="ghcr.io/$OWNER/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"

            echo 'Pushing to ghcr'
            skopeo copy \
            --dest-creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} \
            "docker-archive:result" \
            "docker://$REGISTRY_IMAGE"

  deploy-container-app:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-push-image
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Deploy Container App
        run: |
          cd infra && uv sync && source .venv/bin/activate
          DAGSTER_USER=githubactions dg launch \
            --job update_dagster_containerapp \
            --config-json '{"ops":{"get_latest_release_tag":{"config":{"image_tag":"${{ needs.build-and-push-image.outputs.tag }}"}}}}'
